<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A calm, magical moonlit garden scene created as a special gift.">
  <title>A Quiet Evening | Version 1</title>
  
  <!-- Typography Setup -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Sacramento&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Screen Sequence -->
  <div id="loader" class="loading-screen" aria-hidden="false">
    <div class="loader-bg-particles" id="loader-particles"></div>
    <div class="loader-content">
      <h1 class="loader-text">Someone made something special for you...</h1>
      <div class="loader-indicator" aria-label="Loading scene">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- Immersive Main Scene -->
  <main id="main-scene" class="scene-wrapper" aria-hidden="true" style="opacity: 0; pointer-events: none;">
    
    <!-- Parallax-controlled Sky Environment -->
    <div class="sky-background"></div>
    
    <div class="parallax-layer stars-layer" data-depth="0.05" id="stars-container"></div>
    
    <div class="parallax-layer clouds-layer" data-depth="0.1" id="clouds-container"></div>
    
    <div class="parallax-layer moon-layer" data-depth="0.15">
      <div class="moon-container">
        <div class="moon" role="img" aria-label="Glowing full moon">
          <div class="moon-texture"></div>
        </div>
      </div>
    </div>

    <!-- Active Firefly Ecosystem -->
    <div class="firefly-container" id="firefly-container"></div>

    <!-- Floating Petals Layer -->
    <div class="petals-container" id="petals-container"></div>

    <!-- Magical Meadow / Garden Layer -->
    <div class="parallax-layer meadow-layer" data-depth="0.03" id="meadow-container">
      <div class="meadow-ground"></div>
      <div class="grass-field" id="grass-field"></div>
      <div class="flower-field" id="flower-field"></div>
    </div>

    <!-- Future Expansion Anchor -->
    <!-- Content containers for envelopes, letters, trees, etc. can be dynamically injected here in future versions -->
    <div id="interactive-anchor" class="interactive-overlay"></div>

  </main>

  <!-- Main JavaScript Logic -->
  <script src="script.js"></script>
</body>
</html>
