<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magical Evening</title>
    <!-- Google Fonts: Elegant Serif, Modern Sans, and Premium Script -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. Loading Screen -->
    <div id="loader" class="loader-container">
        <div class="loader-content">
            <div class="loader-glow-ring"></div>
            <p class="loader-text">Someone made something special for you...</p>
            <div class="loader-progress-bar">
                <div class="loader-progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- 2. Main Scene -->
    <main id="scene" class="scene-container hidden-scene">
        
        <!-- Sky Layer (Background) -->
        <div class="sky-bg"></div>

        <!-- Parallax Layer: Stars -->
        <div class="stars-layer" data-speed="0.015">
            <div id="stars-container"></div>
        </div>

        <!-- Parallax Layer: Moon -->
        <div class="moon-layer" data-speed="0.03">
            <div class="moon">
                <div class="moon-crater crater-1"></div>
                <div class="moon-crater crater-2"></div>
                <div class="moon-crater crater-3"></div>
            </div>
        </div>

        <!-- Parallax Layer: Clouds -->
        <div class="clouds-layer" data-speed="0.045">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>

        <!-- Canvas for Dynamic Fireflies and Floating Petals -->
        <canvas id="atmosphere-canvas"></canvas>

        <!-- Foregrounds: Lush Meadow (Dynamic Grass & Flowers generated via JS) -->
        <div class="meadow-container" data-speed="0.01">
            <div class="meadow-floor"></div>
            <div id="grass-canopy" class="grass-canopy"></div>
        </div>

        <!-- Atmospheric Ambient Overlay -->
        <div class="ambient-vignette"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
