<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>A Premium Celebration</title>
  <!-- Google Fonts for Elegant Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient Luxury Background Elements (Preserved across all scenes) -->
  <div class="ambient-background">
    <div class="gradient-overlay"></div>
    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>
    
    <!-- Animated Cloud Container -->
    <div class="cloud-container" id="cloud-container">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
    </div>
  </div>

  <!-- Main Viewport Container -->
  <main id="app-container">

    <!-- SCENE 1: LOADING SCREEN -->
    <section id="scene-loading" class="scene active">
      <div class="loader-wrapper">
        <div class="loader-logo">
          <span class="logo-initial">M</span>
        </div>
        <div class="loader-bar-container">
          <div class="loader-bar" id="loader-progress"></div>
        </div>
        <div class="loader-text" id="loader-status">Initializing Experience...</div>
        <div class="loader-percentage" id="loader-percentage">0%</div>
      </div>
    </section>

    <!-- SCENE 2: WELCOME SCREEN -->
    <section id="scene-welcome" class="scene hidden">
      <div class="glass-card welcome-card">
        <div class="card-accent-line"></div>
        <div class="card-header">
          <span class="subtitle">An Invitation</span>
          <h1 class="main-title">A Journey of Celebration</h1>
        </div>
        <div class="card-body">
          <p class="welcome-text">
            Step into an interactive, curated experience crafted exclusively to celebrate your special day. A series of moments, memories, and wonders await your discovery.
          </p>
        </div>
        <div class="card-footer">
          <button id="btn-start-celebration" class="btn-premium">
            <span class="btn-text">Begin the Celebration</span>
            <span class="btn-glow"></span>
          </button>
        </div>
      </div>
    </section>

    <!-- FUTURE SCENES PLACEHOLDER HOOKS (Preserved structure for future versions) -->
    <!-- Scene 3: Birthday Card (Hidden in V1) -->
    <section id="scene-card" class="scene hidden"></section>
    <!-- Scene 4: Garden (Hidden in V1) -->
    <section id="scene-garden" class="scene hidden"></section>
    <!-- Scene 5: Gift (Hidden in V1) -->
    <section id="scene-gift" class="scene hidden"></section>
    <!-- Scene 6: Cake (Hidden in V1) -->
    <section id="scene-cake" class="scene hidden"></section>
    <!-- Scene 7: Celebration (Hidden in V1) -->
    <section id="scene-celebration" class="scene hidden"></section>
    <!-- Scene 8: Final Wish (Hidden in V1) -->
    <section id="scene-wish" class="scene hidden"></section>

  </main>

  <script src="script.js"></script>
</body>
</html>
